name: CI/CD — Marketplace Universitario

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop
    types: [opened, synchronize, reopened]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # CI — Backend: lint + tests de integración con cobertura ≥ 70%
  # ─────────────────────────────────────────────────────────────────────────────
  test-backend:
    name: Backend — Tests y Cobertura
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: marketplace-universitario/backend

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db
      DIRECT_URL: postgresql://test_user:test_pass@localhost:5432/test_db
      SUPABASE_URL: https://placeholder.supabase.co
      SUPABASE_ANON_KEY: placeholder-anon-key
      JWT_SECRET: placeholder-secret-minimum-32-characters-long
      JWT_EXPIRES_IN: 8h
      BCRYPT_COST_FACTOR: '4'
      FRONTEND_URL: http://localhost:5173
      RESEND_API_KEY: placeholder-resend-key
      EMAIL_FROM: noreply@placeholder.com

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: marketplace-universitario/backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Generar Prisma Client
        run: npx prisma generate

      - name: Aplicar migraciones a la BD de test
        run: npx prisma migrate deploy

      - name: Lint (ESLint)
        run: npm run lint --if-present

      - name: Tests con cobertura
        run: npm test -- --coverage --forceExit

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: marketplace-universitario/backend/coverage/

  # ─────────────────────────────────────────────────────────────────────────────
  # CI — Frontend: lint + build
  # ─────────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: marketplace-universitario/frontend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: marketplace-universitario/frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint --if-present

      - name: Build de producción
        run: npm run build
        env:
          VITE_API_URL: https://marketplace-backend-production-41a0.up.railway.app
          VITE_APP_NAME: Marketplace Universitario

  # ─────────────────────────────────────────────────────────────────────────────
  # CD — Deploy a Railway (backend) y Vercel (frontend)
  # Solo se ejecuta en push a main, después de que CI pase
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Railway
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger deploy en Railway (commit más reciente)
        run: |
          RESULT=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { serviceInstanceDeploy(serviceId: \"697c16ba-77d7-44bf-856a-2a08a1ffc079\", environmentId: \"a7294098-0cc1-4462-8171-8f232001dde9\", latestCommit: true) }"}')
          echo "Railway response: $RESULT"

  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy a Vercel (producción)
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
