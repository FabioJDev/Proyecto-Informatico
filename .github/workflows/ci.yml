name: CI — Marketplace Universitario

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  lint-and-test-backend:
    name: Backend — Lint y Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: marketplace-universitario/backend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: marketplace-universitario/backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar linter (ESLint)
        run: npm run lint --if-present

      - name: Ejecutar tests unitarios
        run: npm test --if-present
        env:
          NODE_ENV: test

  build-frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: marketplace-universitario/frontend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: marketplace-universitario/frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar linter (ESLint)
        run: npm run lint --if-present

      - name: Build de producción
        run: npm run build
        env:
          VITE_API_BASE_URL: https://placeholder-api.railway.app/api
          VITE_APP_NAME: Marketplace Universitario
