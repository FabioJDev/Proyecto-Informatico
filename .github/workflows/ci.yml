name: CI — Marketplace Universitario

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  lint-and-test-backend:
    name: Backend — Lint y Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: marketplace-universitario/backend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: marketplace-universitario/backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar linter (ESLint)
        run: npm run lint --if-present

      - name: Ejecutar tests unitarios
        run: npm test --if-present
        continue-on-error: true
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:placeholder@localhost:5432/test
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder-anon-key
          JWT_SECRET: placeholder-secret-minimum-32-characters-long
          JWT_EXPIRES_IN: 8h
          BCRYPT_COST_FACTOR: '4'
          FRONTEND_URL: http://localhost:5173

  build-frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: marketplace-universitario/frontend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: marketplace-universitario/frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar linter (ESLint)
        run: npm run lint --if-present

      - name: Build de producción
        run: npm run build
        env:
          VITE_API_BASE_URL: https://marketplace-backend-production-41a0.up.railway.app
          VITE_APP_NAME: Marketplace Universitario

  deploy-backend:
    name: Deploy → Railway
    runs-on: ubuntu-latest
    needs: lint-and-test-backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Railway redeploy via API
        run: |
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { serviceInstanceDeploy(serviceId: \"697c16ba-77d7-44bf-856a-2a08a1ffc079\", environmentId: \"a7294098-0cc1-4462-8171-8f232001dde9\") }"}' \
            | grep -o '"serviceInstanceDeploy":[a-z]*'
          echo " — Deploy disparado en Railway"

  deploy-frontend:
    name: Deploy → Vercel
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Vercel CLI
        run: npm install -g vercel

      - name: Deploy a Vercel (producción)
        run: |
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
